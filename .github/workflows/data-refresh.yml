name: data-refresh

on:
  schedule:
    # 21:00 UTC = 17:00 ET = 30 min after NYSE close (Mon-Fri)
    - cron: '0 21 * * 1-5'
    # 11:00 UTC = 07:00 ET = pre-market snapshot (Mon-Fri)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: {}
  # Run when the workflow itself or any scrape script changes — gives us a
  # remote dry-run path without needing to wait for the next cron tick.
  push:
    branches: [main]
    paths:
      - '.github/workflows/data-refresh.yml'
      - 'scripts/**'

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape quotes (Yahoo + Saveticker)
        run: node scripts/scrape-quotes.mjs

      - name: Scrape news (Saveticker)
        run: node scripts/scrape-news.mjs
        continue-on-error: true

      - name: Verify quotes (cross-source)
        run: node scripts/verify-quotes.mjs

      - name: Validate JSON
        run: |
          for f in data/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "OK $f"
          done

      - name: Commit & push if changed
        run: |
          if git diff --quiet data/ reports/raw/ reports/validation/; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git config user.name 'data-refresh-bot'
          git config user.email 'bot@users.noreply.github.com'
          git add data/price-quotes.json data/news-feed.json reports/raw/ reports/validation/
          git commit -m "data: scheduled refresh $(date -u +%FT%TZ)"
          git push
